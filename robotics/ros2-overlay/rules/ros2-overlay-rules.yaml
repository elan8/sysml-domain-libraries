version: 1
library: Ros2Overlay
rules:
  - id: ROS201
    severity: warning
    category: messaging
    title: ROS 2 publishers and subscribers should declare message types
    description: RosPublisher and RosSubscriber elements should be associated with a RosMessageType for interface clarity.
  - id: ROS202
    severity: warning
    category: lifecycle
    title: ROS 2 lifecycle nodes should define lifecycle handling
    description: RosLifecycleNode elements should model lifecycle state handling explicitly.
  - id: ROS203
    severity: warning
    category: transforms
    title: Transform-dependent systems should model frame relationships
    description: Robots that rely on coordinate transforms should define RosTransformFrame concepts explicitly.
