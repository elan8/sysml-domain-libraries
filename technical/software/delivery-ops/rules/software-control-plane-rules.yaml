version: 1
library: SoftwareControlPlane
rules:
  - id: SWC001
    severity: error
    category: config
    title: Configuration source should define a URI
    description: Every ConfigurationSource should define a sourceUri so configuration provenance is explicit.
  - id: SWC002
    severity: warning
    category: config
    title: Secret item should be modeled separately from general config
    description: Sensitive configuration should specialize SecretItem rather than being left as a generic ConfigurationItem.
  - id: SWC101
    severity: warning
    category: operations
    title: Deployable workload should have a health signal
    description: Services and workloads should define at least one HealthSignal so runtime readiness and liveness can be reasoned about.
  - id: SWC102
    severity: warning
    category: operations
    title: Scaled workload should have a scaling policy
    description: Workloads modeled for scalable deployment should define a ScalingPolicy or equivalent intent.
  - id: SWC201
    severity: warning
    category: dependencies
    title: External endpoint should be modeled explicitly
    description: Dependencies on external runtime endpoints should be represented using ExternalEndpoint rather than remaining implicit.
  - id: SWC202
    severity: warning
    category: dependencies
    title: External tool dependency should be modeled explicitly
    description: Components that invoke local or remote tools should represent those runtime dependencies using ExternalToolDependency or an equivalent RuntimeDependency.
  - id: SWC301
    severity: warning
    category: operations
    title: Mutating operation should declare an execution safety policy
    description: Operations that can change system or workspace state should declare an ExecutionSafetyPolicy such as preview, confirmation, apply, or validation intent.
  - id: SWC302
    severity: warning
    category: operations
    title: Bounded output should declare output handling
    description: Operations with paginated, truncated, or externalized output should model an OutputHandlingPolicy so consumers understand how complete results are obtained.
